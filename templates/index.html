<!DOCTYPE html>
<html>
<head>
    <title>Bengaluru House Price Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main-container fade-in">

    <h1 class="title">🏠 Bengaluru House Price Predictor</h1>

    <div class="form-card">

        <form action="/predict" method="POST">

            <div class="form-group">
                <label>Location</label>
                <select name="location" required>
                    <option value="" disabled selected>Select Location</option>
                    {% for loc in locations %}
                        <option value="{{ loc }}">{{ loc }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Total Area (sqft)</label>
                <input type="number" name="sqft" placeholder="Enter Sqft (e.g., 1200)" required>
            </div>

            <div class="form-group">
                <label>BHK</label>
                <input type="number" name="bhk" placeholder="Bedrooms (e.g., 3)" required>
            </div>

            <div class="form-group">
                <label>Bathrooms</label>
                <input type="number" name="bath" placeholder="Bathrooms (e.g., 2)" required>
            </div>

            <button class="primary-btn" type="submit">Predict Price</button>

        </form>

    </div>

</div>

</body>
</html>
